<style>
:root{--ink:#0B2E2A;--green:#0A6E56;--greenDark:#075E49;--greenSoft:#E3F1EC;--accent:#FF8A3D;
--ok:#16A34A;--okSoft:#DCFCE7;--bad:#EF4444;--badSoft:#FEE2E2;--bg:#F2F7F3;--muted:#5B6E68;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;background:var(--bg);color:var(--ink);
font-family:"Nunito",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
.hd{background:var(--green);color:#fff;padding:calc(16px + env(safe-area-inset-top)) 18px 20px;}
.wrap{max-width:760px;margin:0 auto;}
.title{font-weight:800;font-size:22px;line-height:1;}
.sub{opacity:.85;font-size:13px;font-weight:700;margin-top:4px;}
.stat{text-align:right;font-weight:800;}
.bar{height:10px;background:rgba(255,255,255,.25);border-radius:999px;margin-top:5px;overflow:hidden;}
.bar>i{display:block;height:100%;background:var(--accent);border-radius:999px;transition:width .4s;}
.nav{max-width:760px;margin:0 auto;padding:12px 12px 0;display:flex;gap:7px;flex-wrap:wrap;}
.pill{font-weight:700;font-size:14px;padding:9px 13px;border-radius:999px;border:none;cursor:pointer;
background:#fff;color:var(--greenDark);box-shadow:0 1px 0 rgba(10,110,86,.1);}
.pill.on{background:var(--green);color:#fff;box-shadow:none;}
.main{max-width:760px;margin:0 auto;padding:14px;}
.card{background:#fff;border-radius:20px;padding:20px;margin-bottom:14px;
box-shadow:0 2px 0 rgba(10,110,86,.08),0 10px 30px rgba(11,46,42,.06);}
.btn{font-weight:700;font-size:16px;padding:12px 18px;border-radius:14px;border:none;cursor:pointer;
background:var(--green);color:#fff;}
.btn.accent{background:var(--accent);color:#3a1c00;}
.btn.ghost{background:var(--greenSoft);color:var(--greenDark);}
.btn.outline{background:#fff;color:var(--greenDark);border:2px solid var(--greenSoft);}
.btn:disabled{opacity:.5;}
.row{display:flex;gap:8px;flex-wrap:wrap;}
.tog{font-weight:700;font-size:14px;padding:8px 13px;border-radius:999px;border:none;cursor:pointer;
background:#fff;color:var(--greenDark);box-shadow:0 1px 0 rgba(10,110,86,.1);}
.tog.on{background:var(--green);color:#fff;box-shadow:none;}
input.answer{width:100%;font-family:inherit;font-weight:700;font-size:18px;padding:12px 14px;
border-radius:14px;border:2px solid var(--greenSoft);text-align:center;}
.muted{color:var(--muted);font-weight:700;font-size:13px;}
.big{font-weight:800;font-size:28px;}
.fb{border-radius:14px;padding:14px;text-align:center;margin-top:12px;}
.fb.ok{background:var(--okSoft);} .fb.bad{background:var(--badSoft);}
.ltr{display:inline-block;font-weight:800;font-size:20px;padding:2px 5px;border-radius:6px;margin:1px;}
.ltr.ok{background:var(--okSoft);color:var(--ok);border-bottom:2px solid var(--ok);}
.ltr.bad{background:var(--badSoft);color:var(--bad);border-bottom:2px solid var(--bad);}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.tile{text-align:left;background:#fff;border:none;border-radius:20px;padding:16px;cursor:pointer;
box-shadow:0 2px 0 rgba(10,110,86,.08),0 8px 24px rgba(11,46,42,.05);}
.days{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.day{aspect-ratio:1;border-radius:14px;border:none;cursor:pointer;font-weight:800;font-size:16px;
background:#fff;color:var(--greenDark);box-shadow:0 1px 0 rgba(10,110,86,.1);}
.day.done{background:var(--green);color:#fff;}
.prog{display:flex;gap:4px;margin:6px 0 12px;}
.prog>i{flex:1;height:6px;border-radius:999px;background:var(--greenSoft);}
.prog>i.on{background:var(--green);} .prog>i.cur{background:var(--accent);}
pre.explain{white-space:pre-wrap;font-family:inherit;font-weight:600;font-size:15px;margin:0;line-height:1.5;}
.acc{width:100%;text-align:left;background:#fff;border:none;border-radius:16px;padding:16px;cursor:pointer;
box-shadow:0 1px 0 rgba(10,110,86,.1);display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px;}
.foot{text-align:center;padding:10px 14px calc(24px + env(safe-area-inset-bottom));color:var(--muted);font-size:12px;max-width:600px;margin:0 auto;}
h3.h{font-weight:800;font-size:18px;margin:0 0 6px;}
a{color:var(--greenDark);}
@media(min-width:500px){.title{font-size:24px;}}
</style>

{id:"modals1",title:"Modalverben: can/can't, must, needn't, mustn't",unit:"Unit 1",core:true,explain:"• can/can't = können / nicht können\n• must = müssen  ·  mustn't = nicht dürfen (Verbot!)\n• needn't = nicht müssen/brauchen\nAchtung: mustn't ≠ needn't!  You mustn't smoke (verboten). ↔ You needn't hurry (nicht nötig).",ex:[{q:"You ___ (Verbot) run near the pool.",a:["mustn't","must not"]},{q:"It's not far. We ___ (nicht nötig) take the bus.",a:["needn't","need not"]}]},
{id:"comp",title:"Steigerung von Adjektiven (comparison)",unit:"Unit 1",core:true,explain:"• kurz: -er / -est → old, older, the oldest\n• lang (2+ Silben): more / most → more interesting\n• unregelmäßig: good→better→best, bad→worse→worst\n• gleich: as … as\nSchreibung: big→bigger, easy→easier",ex:[{q:"This film is ___ (good) than that one.",a:["better"]},{q:"It's the ___ (big) city here.",a:["biggest","the biggest"]},{q:"Maths is ___ (difficult) than art.",a:["more difficult"]},{q:"Winter is the ___ (cold) season.",a:["coldest","the coldest"]}]},
{id:"sp",title:"Simple Past (Aussagen, Fragen, Verneinung)",unit:"Unit 1 & 2",core:true,explain:"Abgeschlossene Vergangenheit.\n• regelmäßig: + -ed  → played, watched\n• unregelmäßig: eigene Form → go→went, see→saw\n• Frage/Verneinung mit did (+ Grundform!): didn't play, Did you play?\n• to be: was/were",ex:[{q:"Yesterday we ___ (play) football.",a:["played"]},{q:"She ___ (go) to school by bus.",a:["went"]},{q:"I ___ (not/see) the film.",a:["didn't see","did not see"]},{q:"They ___ (be) happy.",a:["were"]}]},
{id:"goingto",title:"going-to future",unit:"Unit 3",core:true,explain:"Pläne & Vorhersagen mit Anzeichen.\n• am/is/are + going to + Grundform\n• Verneinung: isn't going to\n• Frage: Are you going to …?",ex:[{q:"I ___ (visit) my gran tomorrow.",a:["am going to visit","'m going to visit"]},{q:"She ___ (not/come).",a:["is not going to come","isn't going to come"]}]},
{id:"someany",title:"some / any / every / no",unit:"Unit 3",core:false,explain:"• some: Aussagesatz → I've got some apples.\n• any: Frage/Verneinung → any milk?\n• every = jede/-r/-s · no = kein/-e\n• Personen: somebody/anybody/everybody/nobody\n• Orte: somewhere/anywhere/everywhere/nowhere",ex:[{q:"I've got ___ new games.",a:["some"]},{q:"There isn't ___ milk.",a:["any"]},{q:"Have you got ___ questions?",a:["any"]}]},
{id:"adv",title:"Adverbs (Wie? -ly) & Steigerung",unit:"Unit 3",core:true,explain:"Beschreiben, WIE etwas getan wird (beziehen sich aufs Verb).\n• Adjektiv + -ly → quick→quickly\n• Ausnahmen: good→well, fast→fast, hard→hard\n• Steigerung: more quickly, the most quickly\nMerke: a quick runner (Adj.) ↔ runs quickly (Adv.)",ex:[{q:"He runs very ___ (quick).",a:["quickly"]},{q:"She sings ___ (beautiful).",a:["beautifully"]},{q:"They play ___ (good).",a:["well"]},{q:"The train goes ___ (fast).",a:["fast"]}]},
{id:"pp",title:"Present Perfect",unit:"Unit 4",core:true,explain:"have/has + 3. Form (past participle). Verbindet Vergangenheit & Gegenwart.\n• Signalwörter: ever, never, just, already, yet, since/for\n• regelmäßig: + -ed  ·  unregelmäßig: 3. Spalte (been, seen, done …)\n• since = Zeitpunkt, for = Zeitraum",ex:[{q:"I ___ (finish) my homework.",a:["have finished","'ve finished"]},{q:"She ___ (never/be) to London.",a:["has never been"]}]},
{id:"ppvs",title:"Present Perfect vs. Simple Past",unit:"Unit 4",core:true,explain:"• Simple Past: WANN? konkreter Zeitpunkt (yesterday, in 2020, last week)\n• Present Perfect: Zeitpunkt unwichtig / Bezug zur Gegenwart (ever, never, just, already, yet)\nI saw him yesterday. ↔ I have just seen him.",ex:[{q:"I ___ (see) her yesterday.",a:["saw"]},{q:"I ___ (just/finish) my work.",a:["have just finished","'ve just finished"]},{q:"We ___ (go) to Spain last summer.",a:["went"]}]},
{id:"tags",title:"Question tags (Bestätigungsfragen)",unit:"Unit 5",core:true,explain:"Kleine Rückfrage am Satzende ('…, oder?').\n• positiver Satz → negativer Tag: You're tired, aren't you?\n• negativer Satz → positiver Tag: He doesn't like it, does he?\n• gleiches Hilfsverb; sonst do/does/did",ex:[{q:"You like pizza, ___?",a:["don't you","dont you"]},{q:"She is nice, ___?",a:["isn't she","isnt she"]},{q:"They can't come, ___?",a:["can they"]},{q:"He went home, ___?",a:["didn't he","didnt he"]}]},
{id:"adm",title:"should(n't), could · Ratschläge",unit:"Unit 5",core:false,explain:"• should = sollte (Ratschlag) · shouldn't = sollte nicht\n• could = könnte (Vorschlag/Möglichkeit)\nYou should see a doctor. · You shouldn't run with a twisted ankle. · We could go by bus.",ex:[{q:"You look ill. You ___ (Ratschlag) rest.",a:["should"]},{q:"She ___ (Rat: nicht) eat so much sugar.",a:["shouldn't","should not"]},{q:"We ___ (Vorschlag) take the train.",a:["could"]}]}

["Adjektiv oder Adverb?","Adjektiv beschreibt ein Nomen (a quick runner). Adverb beschreibt das Verb, also WIE etwas getan wird (he runs quickly, meist -ly). Ausnahmen: good→well, fast→fast, hard→hard."],
["So nutzt du den Coach","Am besten jeden Tag den 🗓️ Tagesplan machen (ca. 20 Min.). Zwischendurch kannst du unter 📇 Vokabeln, ✏️ Rechtschreibung oder 🔁 Verben gezielt üben. Erledigte Tage werden grün."]
];

/* ============ helpers ============ */
function norm(s){return (s||"").toLowerCase().trim().replace(/[.!?,;:"']/g,"").replace(/\s+/g," ");}
function accepts(user,answers){var u=norm(user);if(!u)return false;var set={};answers.forEach(function(a){a.split("/").forEach(function(p){var n=norm(p);set[n]=1;set[n.replace(/^to /,"")]=1;});});return !!(set[u]||set[u.replace(/^to /,"")]);}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function speak(t){try{if(!("speechSynthesis"in window))return;var u=new SpeechSynthesisUtterance(t);u.lang="en-GB";u.rate=.85;speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}}
function tip(t){t=(t||"").toLowerCase();if(/(.)\1/.test(t))return"Achte auf den doppelten Buchstaben.";if(/ie|ei/.test(t))return"ie oder ei? Sprich es langsam mit.";if(/tion$/.test(t))return"Endung -tion (klingt wie 'schn').";if(/ough/.test(t))return"Die Gruppe -ough- ist knifflig.";if(/[^aeiou]e$/.test(t))return"Denk an das stumme 'e' am Ende.";if(/y$/.test(t))return"Endet auf -y (nicht -i).";return"Buchstabiere das Wort erst im Kopf.";}
function diffHTML(user,target){var u=(user||"").toLowerCase(),t=(target||"").toLowerCase(),h="";for(var i=0;i<target.length;i++){var ok=u[i]===t[i];var ch=target[i]===" "?"␣":esc(target[i]);h+='<span class="ltr '+(ok?"ok":"bad")+'">'+ch+"</span>";}return h;}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function seeded(seed){var s=seed;return function(){s=(s*9301+49297)%233280;return s/233280;};}
function seededShuffle(a,seed){a=a.slice();var r=seeded(seed);for(var i=a.length-1;i>0;i--){var j=Math.floor(r()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

/* ============ 30-day plan ============ */
var DAYS=30;
var PLAN=(function(){var words=seededShuffle(VOCAB,4242);var per=Math.ceil(words.length/DAYS);var verbs=seededShuffle(IRREGULAR,7);var vPer=Math.ceil(verbs.length/DAYS)+1;var plans=[];for(var d=0;d<DAYS;d++){var nw=words.slice(d*per,d*per+per);var review=d>=2?words.slice((d-2)*per,(d-2)*per+5):[];var spell=nw.filter(function(w){return /^[a-zA-Z][a-zA-Z ]*$/.test(w.en)&&w.en.length<=12;}).slice(0,6);var vb=[];for(var k=0;k<vPer;k++)vb.push(verbs[(d*vPer+k)%verbs.length]);var gr=GRAMMAR[d%GRAMMAR.length];plans.push({day:d+1,newWords:nw,review:review,spell:spell,verbs:vb,grammar:gr});}return plans;})();

/* ============ state ============ */
var KEY="alexCoach_v1";
function load(){try{var s=JSON.parse(localStorage.getItem(KEY));if(s&&s.name!=null)return s;}catch(e){}return{name:"Alex",xp:0,streak:0,done:[]};}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
var S=load();
var V={screen:"home",unit:"all",dir:"de2en",session:null,day:null,gOpen:null,tOpen:null,chat:{msgs:[{role:"assistant",text:"Hi! Ich bin dein English Coach. Frag mich alles auf Deutsch – z. B. „Wann nehme ich present perfect und wann simple past?“ oder „Gib mir 3 Sätze zum Üben.“"}],busy:false,err:""}};
function reward(p,ok){S.xp+=p;S.streak=ok?S.streak+1:0;save();}

/* ============ sessions ============ */
function makeVocab(words,dir,spelling){return{kind:"vocab",dir:dir,spelling:!!spelling,q:shuffle(words),i:0,score:0,seen:0,rev:false,ok:false,typed:""};}
function makeVerb(verbs){return{kind:"verb",q:shuffle(verbs),i:0,score:0,seen:0,rev:false,past:"",pp:""};}
function makeGrammar(g){return{kind:"grammar",g:g,showEx:false,i:0,rev:false,ok:false,typed:""};}

/* day mode */
function startDay(n){var p=PLAN[n-1];var steps=[{label:"Neue Vokabeln kennenlernen",make:function(){return makeVocab(p.newWords,"en2de");}},{label:"Vokabeln auf Englisch schreiben",make:function(){return makeVocab(p.newWords,"de2en");}}];if(p.review.length)steps.push({label:"Kurze Wiederholung",make:function(){return makeVocab(p.review,"de2en");}});steps.push({label:"Rechtschreibung",make:function(){return makeVocab(p.spell,"de2en",true);}});steps.push({label:"Unregelmäßige Verben",make:function(){return makeVerb(p.verbs);}});steps.push({label:"Grammatik: "+p.grammar.title,make:function(){return makeGrammar(p.grammar);}});V.day={n:n,steps:steps,step:0,complete:false};V.session=steps[0].make();V.screen="day";render();}
function dayNext(){if(!V.day)return;V.day.step++;if(V.day.step>=V.day.steps.length){V.day.complete=true;V.session=null;}else{V.session=V.day.steps[V.day.step].make();}render();}
function finishDay(){var n=V.day.n;if(S.done.indexOf(n)<0)S.done.push(n);save();V.day=null;V.session=null;V.screen="plan";render();}

/* generic "session finished" */
function sessionDone(){if(V.day){dayNext();}else{V.session._done=true;render();}}

/* ============ actions ============ */
function go(sc){V.screen=sc;V.session=null;V.day=null;if(sc==="vocab")V.session=makeVocab(filtered(V.unit),V.dir,false);if(sc==="spell")V.session=makeVocab(spellWords(V.unit),V.dir,true);if(sc==="verbs")V.session=makeVerb(IRREGULAR);render();}
function filtered(u){return u==="all"?VOCAB:VOCAB.filter(function(w){return w.u===u;});}
function spellWords(u){return filtered(u).filter(function(w){return /^[a-zA-Z][a-zA-Z ]*$/.test(w.en)&&w.en.length<=14;});}
function setUnit(u){V.unit=u;if(V.screen==="vocab")V.session=makeVocab(filtered(u),V.dir,false);if(V.screen==="spell")V.session=makeVocab(spellWords(u),V.dir,true);render();}
function setDir(d){V.dir=d;if(V.screen==="vocab")V.session=makeVocab(filtered(V.unit),d,false);render();}
function restart(){if(V.screen==="vocab")V.session=makeVocab(filtered(V.unit),V.dir,false);else if(V.screen==="spell")V.session=makeVocab(spellWords(V.unit),V.dir,true);else if(V.screen==="verbs")V.session=makeVerb(IRREGULAR);render();}

function readInput(id){var el=document.getElementById(id);return el?el.value:"";}
function vCheck(){var s=V.session;if(s.rev)return;s.typed=readInput("answer");var cur=s.q[s.i];var ans=s.spelling?cur.en:(s.dir==="de2en"?cur.en:cur.de);s.ok=accepts(s.typed,[ans]);s.rev=true;if(s.ok){s.score++;reward(s.spelling?12:10,true);}else{reward(3,false);s.q.push(cur);}render();}
function vDont(){var s=V.session;s.typed=readInput("answer");s.ok=false;s.rev=true;render();}
function vNext(){var s=V.session;s.seen++;s.rev=false;s.typed="";s.i++;if(s.seen>=s.q.length){sessionDone();return;}render();}

function kCheck(){var s=V.session;if(s.rev)return;s.past=readInput("past");s.pp=readInput("pp");var cur=s.q[s.i];var ok=accepts(s.past,[cur.past])&&accepts(s.pp,[cur.pp]);s.rev=true;if(ok){s.score++;reward(12,true);}else{reward(4,false);s.q.push(cur);}render();}
function kNext(){var s=V.session;s.seen++;s.rev=false;s.past="";s.pp="";s.i++;if(s.seen>=s.q.length){sessionDone();return;}render();}

function gShow(){V.session.showEx=true;render();}
function gCheck(){var s=V.session;if(s.rev)return;s.typed=readInput("answer");var cur=s.g.ex[s.i];s.ok=accepts(s.typed,cur.a);s.rev=true;reward(s.ok?10:3,s.ok);render();}
function gSol(){V.session.ok=false;V.session.rev=true;render();}
function gNext(){var s=V.session;if(s.i+1>=s.g.ex.length){sessionDone();return;}s.i++;s.rev=false;s.typed="";render();}

function resetProgress(){if(confirm("Fortschritt (XP, Streak, erledigte Tage) wirklich zurücksetzen?")){S={name:S.name,xp:0,streak:0,done:[]};save();V.screen="home";render();}}
function setName(v){S.name=v;save();}

/* ============ render ============ */
var LEVELS=["Starter","Rookie","Explorer","Pro","Champion","Legend"];
var NAV=[["home","🏠","Start"],["plan","🗓️","Tagesplan"],["vocab","📇","Vokabeln"],["spell","✏️","Rechtschr."],["verbs","🔁","Verben"],["grammar","🧩","Grammatik"],["chat","💬","Coach"],["tips","💡","Tipps"]];

function header(){var lvl=Math.min(LEVELS.length-1,Math.floor(S.xp/200));var pct=Math.min(100,((S.xp-lvl*200)/200)*100);return '<div class="hd"><div class="wrap"><div style="display:flex;justify-content:space-between;align-items:center;gap:12px"><div><div class="title">'+esc(S.name)+"'s English Coach</div><div class=\"sub\">Green Line 2 · Klasse 6 · Sommertraining</div></div><div class=\"stat\"><div style=\"font-size:20px\">⭐ "+S.xp+'</div><div style="font-size:13px;opacity:.9">🔥 '+S.streak+'</div></div></div><div style="margin-top:14px"><div style="display:flex;justify-content:space-between;font-size:12px;font-weight:800;opacity:.9"><span>Level: '+LEVELS[lvl]+"</span><span>Tag "+S.done.length+'/30</span></div><div class="bar"><i style="width:'+pct+'%"></i></div></div></div></div>';}
function nav(){var h='<div class="nav">';NAV.forEach(function(n){h+='<button class="pill'+(V.screen===n[0]||(n[0]==="plan"&&V.screen==="day")?" on":"")+'" onclick="go(\''+n[0]+'\')"><span style="margin-right:5px">'+n[1]+"</span>"+n[2]+"</button>";});return h+"</div>";}

function tiles(){var next=Math.min(30,S.done.length+1);var t=[["plan","🗓️","Tagesplan","30 Tage · ~20 Min"],["vocab","📇","Vokabeln","frei üben, ~660 Wörter"],["spell","✏️","Rechtschreibung","hören & schreiben"],["verbs","🔁","Verben","past & participle"],["grammar","🧩","Grammatik","Units 1–5"],["tips","💡","Coach-Tipps","Lern- & Grammatiktipps"]];var h="";t.forEach(function(x){h+='<button class="tile" onclick="go(\''+x[0]+'\')"><div style="font-size:26px">'+x[1]+'</div><div style="font-weight:800;font-size:16px;margin-top:4px">'+x[2]+'</div><div class="muted" style="font-weight:600">'+x[3]+"</div></button>";});
return '<div class="card"><h3 class="h">Hi '+esc(S.name)+'! 👋</h3><p style="margin:0 0 12px;color:var(--muted);font-weight:600">Ein Tag = ca. 20 Minuten: Vokabeln, Rechtschreibung, Verben und ein Grammatik-Häppchen – gemischt über alle Units. Dranbleiben lohnt sich!</p><button class="btn accent" onclick="startDay('+next+')">▶ Tag '+next+' starten</button><div style="margin-top:14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><label style="font-weight:800;font-size:14px">Name:</label><input value="'+esc(S.name)+'" oninput="setName(this.value)" style="font-weight:700;padding:8px 12px;border-radius:12px;border:2px solid var(--greenSoft);font-size:15px;width:130px"></div></div><div class="tiles">'+h+'</div><div style="text-align:center;margin-top:14px"><button onclick="resetProgress()" style="background:none;border:none;color:var(--muted);font-weight:700;cursor:pointer;font-size:13px">Fortschritt zurücksetzen</button></div>';}

function unitBtns(){var us=[["all","Alle"],["AC1","AC1"],["U1","U1"],["U2","U2"],["U3","U3"],["U4","U4"],["U5","U5"]];var h="";us.forEach(function(u){h+='<button class="tog'+(V.unit===u[0]?" on":"")+'" onclick="setUnit(\''+u[0]+'\')">'+u[1]+"</button>";});return h;}

function cardVocab(){var s=V.session;if(!s.q.length)return '<div class="card"><p class="muted">Keine Wörter vorhanden.</p></div>';if(s._done)return doneCard(s.score,s.q.length,"Vokabeln");var cur=s.q[s.i];var prompt=s.spelling?cur.de:(s.dir==="de2en"?cur.de:cur.en);var ans=s.spelling?cur.en:(s.dir==="de2en"?cur.en:cur.de);var spk=(s.spelling||s.dir==="en2de")?' <button onclick="speak(\''+cur.en.replace(/'/g,"\\'")+'\')" style="background:none;border:none;cursor:pointer;font-size:20px">🔊</button>':"";
var h='<div class="card"><div style="display:flex;justify-content:space-between" class="muted"><span>'+Math.min(s.seen+1,s.q.length)+" / "+s.q.length+"</span><span>✅ "+s.score+'</span></div><div style="text-align:center;margin-top:8px"><div class="muted">'+(s.spelling?"Wie schreibt man dieses Wort?":(s.dir==="de2en"?"Wie heißt das auf Englisch?":"Was bedeutet das?"))+'</div><div class="big">'+esc(prompt)+spk+"</div></div>";
h+='<input id="answer" class="answer" style="margin-top:14px" placeholder="Antwort tippen …" value="'+esc(s.typed)+'"'+(s.rev?" disabled":"")+">";
if(!s.rev){h+='<div class="row" style="margin-top:12px"><button class="btn" style="flex:1" onclick="vCheck()">Prüfen</button><button class="btn outline" onclick="vDont()">Weiß nicht</button></div>';}
else{h+='<div class="fb '+(s.ok?"ok":"bad")+'"><div style="font-weight:800;font-size:18px;color:'+(s.ok?"var(--ok)":"var(--bad)")+'">'+(s.ok?"Richtig! 🎉":"So ist es richtig:")+'</div><div style="font-weight:800;font-size:24px;margin-top:4px">'+esc(ans)+"</div>";if(!s.ok&&(s.spelling||s.dir==="de2en")){h+='<div style="margin-top:8px">'+diffHTML(s.typed,ans)+'</div><div class="muted" style="margin-top:8px">💡 '+esc(tip(ans))+"</div>";}h+='</div><button class="btn" style="width:100%;margin-top:12px" onclick="vNext()">Weiter →</button>';}
return h+"</div>";}

function cardVerb(){var s=V.session;if(s._done)return doneCard(s.score,s.q.length,"Verben");var cur=s.q[s.i];var okPast=s.rev&&accepts(s.past,[cur.past]),okPp=s.rev&&accepts(s.pp,[cur.pp]);
var h='<div class="card"><div style="display:flex;justify-content:space-between" class="muted"><span>Verb '+Math.min(s.seen+1,s.q.length)+" / "+s.q.length+"</span><span>✅ "+s.score+'</span></div><div style="text-align:center;margin:8px 0"><div class="big">'+esc(cur.inf)+' <button onclick="speak(\''+cur.inf.replace(/^to /,"").replace(/'/g,"\\'")+'\')" style="background:none;border:none;cursor:pointer;font-size:18px">🔊</button></div><div class="muted">'+esc(cur.de)+'</div></div><label class="muted">simple past</label><input id="past" class="answer" style="text-align:left;margin:4px 0 8px" placeholder="z. B. went" value="'+esc(s.past)+'"'+(s.rev?" disabled":"")+'><label class="muted">past participle (3. Form)</label><input id="pp" class="answer" style="text-align:left;margin-top:4px" placeholder="z. B. gone" value="'+esc(s.pp)+'"'+(s.rev?" disabled":"")+">";
if(!s.rev)h+='<button class="btn" style="width:100%;margin-top:12px" onclick="kCheck()">Prüfen</button>';
else h+='<div class="fb '+(okPast&&okPp?"ok":"bad")+'"><div style="font-weight:800;font-size:20px">'+esc(cur.inf.replace(/^to /,""))+" – "+esc(cur.past)+" – "+esc(cur.pp)+'</div></div><button class="btn" style="width:100%;margin-top:12px" onclick="kNext()">Weiter →</button>';
return h+"</div>";}

function cardGrammar(){var s=V.session;var g=s.g;var h='<div class="card"><div style="font-weight:800;font-size:16px;margin-bottom:6px">'+esc(g.title)+' <span class="muted">· '+esc(g.unit)+'</span></div><pre class="explain">'+esc(g.explain)+"</pre>";
if(!s.showEx){h+='<div style="margin-top:12px"><button class="btn" onclick="gShow()">Kurz üben →</button></div>';}
else{var cur=g.ex[s.i];h+='<div style="margin-top:14px;background:var(--bg);border-radius:14px;padding:14px"><div class="muted">Aufgabe '+(s.i+1)+"/"+g.ex.length+'</div><div style="font-weight:800;font-size:16px;margin:6px 0 10px">'+esc(cur.q)+'</div><input id="answer" class="answer" style="text-align:left" placeholder="Lücke füllen …" value="'+esc(s.typed)+'"'+(s.rev?" disabled":"")+">";
if(!s.rev)h+='<div class="row" style="margin-top:10px"><button class="btn" style="flex:1" onclick="gCheck()">Prüfen</button><button class="btn outline" onclick="gSol()">Lösung</button></div>';
else{h+='<div class="fb '+(s.ok?"ok":"bad")+'" style="text-align:left"><div style="font-weight:800;color:'+(s.ok?"var(--ok)":"var(--bad)")+'">'+(s.ok?"Richtig! 🎉":"Lösung:")+'</div><div style="font-weight:800;font-size:18px">'+esc(cur.a[0].replace(" / "," … "))+"</div>"+(cur.tip?'<div class="muted" style="margin-top:4px">💡 '+esc(cur.tip)+"</div>":"")+'</div><button class="btn" style="width:100%;margin-top:10px" onclick="gNext()">'+(s.i+1>=g.ex.length?"Fertig ✓":"Weiter →")+"</button>";}
h+="</div>";}
return h+"</div>";}

function doneCard(score,total,label){return '<div class="card" style="text-align:center"><div style="font-size:44px">🎉</div><div style="font-weight:800;font-size:20px;margin:6px 0">Geschafft!</div><div class="muted">'+score+" von "+total+' auf Anhieb richtig.</div><button class="btn" style="margin-top:12px" onclick="restart()">Nochmal ('+label+")</button></div>";}

function screenPlan(){if(V.day)return screenDay();var h='<div class="card" style="background:var(--greenSoft)"><h3 class="h">🗓️ Dein 30-Tage-Sommerplan</h3><p style="margin:6px 0 0;color:var(--greenDark);font-weight:600">Jeder Tag ~20 Min. und mischt Vokabeln, Rechtschreibung, Verben und Grammatik aus allen Units.</p></div><div class="days">';PLAN.forEach(function(p){var done=S.done.indexOf(p.day)>=0;h+='<button class="day'+(done?" done":"")+'" onclick="startDay('+p.day+')">'+(done?"✓":p.day)+"</button>";});return h+"</div>";}

function screenDay(){var d=V.day;var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><button onclick="go(\'plan\')" style="background:none;border:none;color:var(--muted);font-weight:800;cursor:pointer">← Übersicht</button><div style="font-weight:800">Tag '+d.n+"</div></div>";
h+='<div class="prog">';d.steps.forEach(function(x,i){h+='<i class="'+(i<d.step?"on":i===d.step?"cur":"")+'"></i>';});h+="</div>";
if(d.complete){h+='<div class="card" style="text-align:center"><div style="font-size:48px">🏅</div><div style="font-weight:800;font-size:22px;margin:8px 0">Tag '+d.n+' geschafft!</div><p style="color:var(--muted);font-weight:600">Super gemacht. Morgen geht\'s mit Tag '+Math.min(30,d.n+1)+' weiter.</p><button class="btn" onclick="finishDay()">Fertig ✓</button></div>';return h;}
h+='<div style="font-weight:800;font-size:16px;margin:2px 0 10px;color:var(--greenDark)">Schritt '+(d.step+1)+"/"+d.steps.length+": "+esc(d.steps[d.step].label)+"</div>";
h+=cardActive();
h+='<div style="text-align:center;margin-top:10px"><button onclick="dayNext()" style="background:none;border:none;color:var(--muted);font-weight:700;cursor:pointer;font-size:13px">Schritt überspringen →</button></div>';
return h;}

function cardActive(){var s=V.session;if(!s)return"";if(s.kind==="vocab")return cardVocab();if(s.kind==="verb")return cardVerb();if(s.kind==="grammar")return cardGrammar();return"";}

function screenVocab(){return '<div class="card"><h3 class="h">📇 Vokabeln frei üben</h3><div class="row" style="margin-bottom:8px">'+unitBtns()+'</div><div class="row"><button class="tog'+(V.dir==="de2en"?" on":"")+'" onclick="setDir(\'de2en\')">DE → EN</button><button class="tog'+(V.dir==="en2de"?" on":"")+'" onclick="setDir(\'en2de\')">EN → DE</button></div><div class="muted" style="margin-top:8px">'+V.session.q.length+" Wörter"+(V.unit!=="all"?" · "+UNIT_NAMES[V.unit]:"")+"</div></div>"+cardVocab();}
function screenSpell(){return '<div class="card"><h3 class="h">✏️ Rechtschreibung</h3><p class="muted" style="font-weight:600;margin:0 0 8px">Wort anhören (🔊), dann richtig schreiben. Bei Fehlern zeigt der Coach genau, welcher Buchstabe nicht passt.</p><div class="row">'+unitBtns()+"</div></div>"+cardVocab();}
function screenVerbs(){return '<div class="card"><h3 class="h">🔁 Unregelmäßige Verben</h3><p class="muted" style="font-weight:600;margin:0">Infinitiv → simple past → past participle.</p></div>'+cardVerb();}
function screenGrammar(){var h='<div class="card" style="background:var(--greenSoft)"><h3 class="h">🧩 Grammatik – Green Line 2</h3><p style="margin:6px 0 0;color:var(--greenDark);font-weight:600">Themen nach Units. ⭐ = besonders wichtig fürs nächste Jahr.</p></div>';GRAMMAR.forEach(function(g){h+='<button class="acc" onclick="gToggle(\''+g.id+'\')"><span><span style="font-weight:800;font-size:16px">'+(g.core?"⭐ ":"")+esc(g.title)+'</span><br><span class="muted">'+esc(g.unit)+'</span></span><span style="color:var(--green);font-weight:900;font-size:20px">'+(V.gOpen===g.id?"–":"+")+"</span></button>";if(V.gOpen===g.id){h+=cardGrammar();}});return h;}
function gToggle(id){if(V.gOpen===id){V.gOpen=null;V.session=null;}else{V.gOpen=id;V.session=makeGrammar(GRAMMAR.filter(function(g){return g.id===id;})[0]);}render();}
function screenTips(){var h='<div class="card" style="background:var(--greenSoft)"><h3 class="h">💡 Coach-Tipps</h3><p style="margin:6px 0 0;color:var(--greenDark);font-weight:600">Kurze Lern- und Grammatiktipps zum Nachlesen.</p></div>';TIPS.forEach(function(t,i){h+='<button class="acc" onclick="tToggle('+i+')"><span style="font-weight:800;font-size:15px">'+esc(t[0])+'</span><span style="color:var(--green);font-weight:900;font-size:20px">'+(V.tOpen===i?"–":"+")+"</span></button>";if(V.tOpen===i)h+='<div class="card">'+esc(t[1])+"</div>";});return h;}
function tToggle(i){V.tOpen=V.tOpen===i?null:i;render();}

function sendChat(){var el=document.getElementById("chatinput");var q=(el?el.value:"").trim();if(!q||V.chat.busy)return;V.chat.msgs.push({role:"user",text:q});V.chat.busy=true;V.chat.err="";render();
fetch("/api/chat",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({messages:V.chat.msgs.map(function(m){return{role:m.role,content:m.text};})})}).then(function(r){if(!r.ok)throw 0;return r.json();}).then(function(d){V.chat.msgs.push({role:"assistant",text:(d&&d.text)||"\u2026"});V.chat.busy=false;render();}).catch(function(){V.chat.err="Der Coach-Chat ist gerade nicht erreichbar. Alle Übungen funktionieren aber weiter.";V.chat.busy=false;render();});}
function screenChat(){var h='<div class="card" style="padding:0;overflow:hidden"><div id="chatlog" style="max-height:60vh;overflow-y:auto;padding:16px;display:grid;gap:10px">';V.chat.msgs.forEach(function(m){var me=m.role==="user";h+='<div style="justify-self:'+(me?"end":"start")+';max-width:85%;background:'+(me?"var(--green)":"var(--greenSoft)")+';color:'+(me?"#fff":"var(--ink)")+';border-radius:16px;padding:10px 14px;font-weight:600;white-space:pre-wrap;line-height:1.45">'+esc(m.text)+"</div>";});if(V.chat.busy)h+='<div class="muted">Coach schreibt \u2026</div>';h+='</div><div style="padding:12px;border-top:1px solid var(--greenSoft);display:flex;gap:8px"><input id="chatinput" style="flex:1;font-family:inherit;font-weight:600;font-size:15px;padding:11px 14px;border-radius:14px;border:2px solid var(--greenSoft)" placeholder="Frag den Coach auf Deutsch \u2026"><button class="btn" onclick="sendChat()"'+(V.chat.busy?" disabled":"")+">Senden</button></div></div>";if(V.chat.err)h+='<div style="color:var(--bad);font-weight:700;font-size:14px;margin-top:8px">'+esc(V.chat.err)+"</div>";return h;}
function render(){var b="";if(V.screen==="home")b=tiles();else if(V.screen==="plan"||V.screen==="day")b=screenPlan();else if(V.screen==="vocab")b=screenVocab();else if(V.screen==="spell")b=screenSpell();else if(V.screen==="verbs")b=screenVerbs();else if(V.screen==="grammar")b=screenGrammar();else if(V.screen==="chat")b=screenChat();else if(V.screen==="tips")b=screenTips();
var foot='<div class="foot">Fortschritt wird auf diesem Gerät gespeichert. Enthalten: Across cultures 1 + Units 1–5. Der Coach-Chat läuft online über Claude Haiku.</div>';
document.getElementById("root").innerHTML=header()+nav()+'<div class="main">'+b+"</div>"+foot;
var ci=document.getElementById("chatinput");if(ci){ci.addEventListener("keydown",function(e){if(e.key==="Enter")sendChat();});}var cl=document.getElementById("chatlog");if(cl)cl.scrollTop=cl.scrollHeight;
var inp=document.getElementById("answer")||document.getElementById("past");
if(inp){try{inp.focus();}catch(e){}var main=document.getElementById("answer");if(main){main.addEventListener("keydown",function(e){if(e.key==="Enter"){var s=V.session;if(s&&s.kind==="grammar"){s.rev?gNext():gCheck();}else{V.session.rev?vNext():vCheck();}}});}var pp=document.getElementById("pp");if(pp){pp.addEventListener("keydown",function(e){if(e.key==="Enter"){V.session.rev?kNext():kCheck();}});}}}
render();
</script>
</body>
</html>
